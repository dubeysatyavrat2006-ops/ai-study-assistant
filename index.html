
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Study Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
}

.card {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  border-radius: 16px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  height: 160px;
  border-radius: 12px;
  border: none;
  padding: 12px;
  font-size: 14px;
  outline: none;
  margin-top: 10px;
  background: rgba(255,255,255,0.1);
  color: white;
}

textarea::placeholder {
  color: #ccc;
}

.controls {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
  flex-wrap: wrap;
  gap: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.btn-summary { background: #6366f1; color: white; }
.btn-summary:hover { background: #4f46e5; }

.btn-quiz { background: #10b981; color: white; }
.btn-quiz:hover { background: #059669; }

.btn-flash { background: #f59e0b; color: white; }
.btn-flash:hover { background: #d97706; }

.output {
  margin-top: 20px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  min-height: 120px;
  white-space: pre-wrap;
}

.file-upload {
  margin-bottom: 10px;
}

.loader {
  display: none;
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>📚 AI Study Assistant</h1>

    <input type="file" id="pdfFile" class="file-upload" accept="application/pdf">

    <textarea id="notes" placeholder="Paste your notes or upload a PDF..."></textarea>

    <div class="controls">
      <button class="btn-summary" onclick="send('summary')">Summarize</button>
      <button class="btn-quiz" onclick="send('quiz')">Quiz</button>
      <button class="btn-flash" onclick="send('flashcards')">Flashcards</button>
    </div>

    <div class="loader" id="loader">⏳ Generating...</div>

    <div class="output" id="output">
      Your results will appear here...
    </div>
  </div>
</div>

<script>
// PDF extraction
document.getElementById("pdfFile").addEventListener("change", async function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = async function() {
    const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    let text = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(i => i.str).join(" ");
    }

    document.getElementById("notes").value = text;
  };

  reader.readAsArrayBuffer(file);
});

// Send to backend
async function send(type) {
  const text = document.getElementById("notes").value;
  const output = document.getElementById("output");
  const loader = document.getElementById("loader");

  if (!text) {
    output.innerText = "⚠️ Please enter notes first.";
    return;
  }

  loader.style.display = "block";
  output.innerText = "";

 const res = await fetch("/api/ai",  {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ type, text })
  });

  const data = await res.json();

  loader.style.display = "none";
  output.innerText = data.result;
}
</script>

</body>
</html>
